<!DOCTYPE html>
<html>
<head>
<title>EMS Login</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  position:relative;

  background-image:url("/images/bg.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  z-index:0;
}


.card{
  position:relative;
  background:#020617;
  color:white;
  padding:35px;
  width:340px;
  border-radius:14px;
  box-shadow:0 20px 40px rgba(0,0,0,.6);
  text-align:center;
  z-index:1;
}

.card h2{
  margin-bottom:5px;
}

.card p{
  color:#94a3b8;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:none;
  background:#1e293b;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#0ea5e9;
}
</style>
</head>

<body>

<div class="card">

<h2>Employee Management System</h2>
<p>Secure Login</p>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>
function login(){
 fetch('/auth/login',{
   method:'POST',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({
     username:user.value,
     password:pass.value
   })
 })
 .then(r=>{
   if(!r.ok) throw "fail";
   return r.json();
 })
 .then(()=>{
   window.location.href="/home";
 })
 .catch(()=>alert("Invalid login"));
}
</script>

</body>
</html>
